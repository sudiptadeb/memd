name: Deploy to production

# Pushes to main (and manual runs) deploy to the memd host. The SSH key used
# here is pinned on the server to a single forced command (ci-deploy.sh), so it
# can only sync main + redeploy — it cannot open a shell or run anything else.
# The service restart happens on the server via a systemd path unit that watches
# the deployed binary; nothing here needs sudo.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          # The argument is ignored: the server forces ci-deploy.sh for this key.
          ssh -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o BatchMode=yes \
              -o ConnectTimeout=20 \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "$DEPLOY_USER@$DEPLOY_HOST" deploy
