<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D9D2BE" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#D9D2BE" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#D9D2BE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1" fill="#F2EFE5" fill-opacity="0.06"/>
    </pattern>
    <symbol id="agent-tile" overflow="visible">
      <rect width="120" height="100" rx="8" fill="#15151A" stroke="#F2EFE5" stroke-opacity="0.18"/>
      <rect width="120" height="22" rx="8" fill="#1D1D22"/>
      <rect y="14" width="120" height="8" fill="#1D1D22"/>
      <line x1="0" y1="22" x2="120" y2="22" stroke="#F2EFE5" stroke-opacity="0.14"/>
      <circle cx="12" cy="11" r="3" fill="#F2EFE5" fill-opacity="0.55"/>
      <circle cx="22" cy="11" r="3" fill="#F2EFE5" fill-opacity="0.28"/>
      <circle cx="32" cy="11" r="3" fill="#F2EFE5" fill-opacity="0.28"/>
    </symbol>
  </defs>

  <rect width="1200" height="627" fill="#08080A"/>
  <rect width="1200" height="627" fill="url(#dots)"/>

  <!-- agent tiles row -->
  <g transform="translate(189, 52) scale(0.85)">
    <use href="#agent-tile"/>
    <text x="60" y="74" text-anchor="middle" font-family="DejaVu Sans" font-size="34" font-weight="700" fill="#F2EFE5">&#8984;</text>
    <text x="60" y="130" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="14" fill="#F2EFE5" fill-opacity="0.85" letter-spacing="0.04em">Claude Code</text>
  </g>
  <g transform="translate(429, 52) scale(0.85)">
    <use href="#agent-tile"/>
    <text x="60" y="76" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="26" font-weight="700" fill="#F2EFE5">$_</text>
    <text x="60" y="130" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="14" fill="#F2EFE5" fill-opacity="0.85" letter-spacing="0.04em">Codex CLI</text>
  </g>
  <g transform="translate(669, 52) scale(0.85)">
    <use href="#agent-tile"/>
    <rect x="55" y="50" width="10" height="36" fill="#F2EFE5"/>
    <text x="60" y="130" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="14" fill="#F2EFE5" fill-opacity="0.85" letter-spacing="0.04em">Cursor</text>
  </g>
  <g transform="translate(909, 52) scale(0.85)">
    <use href="#agent-tile"/>
    <circle cx="60" cy="68" r="16" fill="none" stroke="#F2EFE5" stroke-width="2.2"/>
    <circle cx="60" cy="68" r="3.5" fill="#F2EFE5"/>
    <text x="60" y="130" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="14" fill="#F2EFE5" fill-opacity="0.85" letter-spacing="0.04em">ChatGPT</text>
  </g>

  <!-- spokes from tiles to hub -->
  <g stroke="#D9D2BE" stroke-opacity="0.45" stroke-width="1.6" fill="none">
    <path d="M 240 172 C 240 240, 470 250, 540 296"/>
    <path d="M 480 172 C 480 230, 545 250, 575 288"/>
    <path d="M 720 172 C 720 230, 655 250, 625 288"/>
    <path d="M 960 172 C 960 240, 730 250, 660 296"/>
  </g>
  <g fill="#D9D2BE">
    <circle cx="240" cy="172" r="3.2"/>
    <circle cx="480" cy="172" r="3.2"/>
    <circle cx="720" cy="172" r="3.2"/>
    <circle cx="960" cy="172" r="3.2"/>
  </g>

  <!-- memd hub -->
  <ellipse cx="600" cy="345" rx="260" ry="130" fill="url(#hubGlow)"/>
  <g transform="translate(480, 290)">
    <rect width="240" height="108" rx="14" fill="#F2EFE5"/>
    <rect width="240" height="108" rx="14" fill="none" stroke="#D9D2BE" stroke-width="1.5"/>
    <text x="120" y="72" text-anchor="middle" font-family="DejaVu Sans" font-size="52" font-weight="700" fill="#08080A" letter-spacing="-0.03em">memd</text>
  </g>

  <!-- tagline -->
  <text x="600" y="464" text-anchor="middle" font-family="DejaVu Sans" font-size="27" font-weight="600" fill="#F2EFE5" letter-spacing="-0.01em">unified, file-first memory for AI agents.</text>

  <!-- url pill -->
  <g transform="translate(600, 530)">
    <rect x="-205" y="-31" width="410" height="62" rx="31" fill="#D9D2BE" fill-opacity="0.12" stroke="#D9D2BE" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="0" y="9" text-anchor="middle" font-family="DejaVu Sans Mono" font-size="27" font-weight="700" fill="#D9D2BE" letter-spacing="0.02em">memd.debkosh.com</text>
  </g>
</svg>
