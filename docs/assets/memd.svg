<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="memd — unified, file-first memory for AI agents">
  <title>memd · unified, file-first memory for AI agents</title>

  <defs>
    

    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D9D2BE" stop-opacity="0.28"></stop>
      <stop offset="55%" stop-color="#D9D2BE" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#D9D2BE" stop-opacity="0"></stop>
    </radialGradient>

    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1" fill="#F2EFE5" fill-opacity="0.06"></circle>
    </pattern>

    
    <symbol id="agent-tile" overflow="visible">
      <rect width="120" height="100" rx="8" fill="#15151A" stroke="#F2EFE5" stroke-opacity="0.18"></rect>
      <rect width="120" height="22" rx="8" fill="#1D1D22"></rect>
      <rect y="14" width="120" height="8" fill="#1D1D22"></rect>
      <line x1="0" y1="22" x2="120" y2="22" stroke="#F2EFE5" stroke-opacity="0.14"></line>
      <circle cx="12" cy="11" r="3" fill="#F2EFE5" fill-opacity="0.55"></circle>
      <circle cx="22" cy="11" r="3" fill="#F2EFE5" fill-opacity="0.28"></circle>
      <circle cx="32" cy="11" r="3" fill="#F2EFE5" fill-opacity="0.28"></circle>
    </symbol>

    
    <symbol id="ico-folder" viewBox="0 0 28 20" overflow="visible">
      <path d="M1 4 L10 4 L13 6 L27 6 L27 18 L1 18 Z" fill="none" stroke="#F2EFE5" stroke-width="1.4" stroke-linejoin="round"></path>
    </symbol>
    
    <symbol id="ico-file" viewBox="0 0 24 22" overflow="visible">
      <path d="M2 2 L16 2 L22 8 L22 20 L2 20 Z M16 2 L16 8 L22 8" fill="none" stroke="#F2EFE5" stroke-width="1.4" stroke-linejoin="round"></path>
    </symbol>
  </defs>

  
  <rect width="1600" height="900" fill="#08080A"></rect>
  <rect width="1600" height="900" fill="url(#dots)"></rect>

  
  
  <g fill="none" stroke="#8C9099" stroke-width="1.4" stroke-linecap="round" stroke-opacity="0.55" stroke-dasharray="2 8" class="wire-flow">
    <path d="M 340 280 C 340 420, 280 540, 240 640"></path>
    <path d="M 600 280 C 560 420, 360 560, 260 645"></path>
    <path d="M 860 280 C 820 420, 480 580, 280 650"></path>
    <path d="M 1120 280 C 1080 420, 540 600, 300 655"></path>
  </g>
  
  <path d="M 380 660 L 600 660" stroke="#5A5E66" stroke-width="1.6" fill="none"></path>
  
  <path d="M 1000 580 C 1080 540, 1140 480, 1180 460" stroke="#A89F88" stroke-width="1.6" fill="none"></path>

  
  
  <g transform="translate(280, 180)">
    <use href="#agent-tile"></use>
    <text x="60" y="74" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="34" font-weight="700" fill="#F2EFE5">⌘</text>
    <text x="60" y="128" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="13" fill="#F2EFE5" fill-opacity="0.85" letter-spacing="0.04em">Claude Code</text>
  </g>
  
  <g transform="translate(540, 180)">
    <use href="#agent-tile"></use>
    <text x="60" y="76" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="26" font-weight="700" fill="#F2EFE5">$_</text>
    <text x="60" y="128" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="13" fill="#F2EFE5" fill-opacity="0.85" letter-spacing="0.04em">Codex CLI</text>
  </g>
  
  <g transform="translate(800, 180)">
    <use href="#agent-tile"></use>
    <rect x="55" y="50" width="10" height="36" fill="#F2EFE5"></rect>
    <text x="60" y="128" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="13" fill="#F2EFE5" fill-opacity="0.85" letter-spacing="0.04em">Cursor</text>
  </g>
  
  <g transform="translate(1060, 180)">
    <use href="#agent-tile"></use>
    <circle cx="60" cy="68" r="16" fill="none" stroke="#F2EFE5" stroke-width="2.2"></circle>
    <circle cx="60" cy="68" r="3.5" fill="#F2EFE5"></circle>
    <text x="60" y="128" text-anchor="middle" font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="13" fill="#F2EFE5" fill-opacity="0.85" letter-spacing="0.04em">ChatGPT</text>
  </g>

  
  <g transform="translate(180, 600)">
    <ellipse cx="120" cy="70" rx="200" ry="140" fill="url(#hubGlow)" class="glow"></ellipse>
    <rect x="20" y="10" width="200" height="120" rx="14" fill="#F2EFE5"></rect>
    <rect x="20" y="10" width="200" height="120" rx="14" fill="none" stroke="#D9D2BE" stroke-width="1.5"></rect>
    <text x="120" y="88" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="700" fill="#08080A" letter-spacing="-0.03em">memd</text>
  </g>

  
  <g transform="translate(620, 460)">
    <rect width="380" height="320" rx="6" fill="#15151A" stroke="#F2EFE5" stroke-opacity="0.16"></rect>

    <g font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="14">
      
      <g transform="translate(24, 32)">
        <use href="#ico-folder" x="0" y="-12" width="22" height="16"></use>
        <text x="34" y="2" fill="#F2EFE5" font-weight="600">memd/</text>
      </g>
      
      <g transform="translate(44, 68)">
        <rect x="-14" y="-18" width="334" height="32" rx="4" fill="#D9D2BE" fill-opacity="0.14"></rect>
        <rect x="-14" y="-18" width="3" height="32" fill="#D9D2BE"></rect>
        <path d="M14 -10 L8 4 L20 4 Z M14 -10 L20 4 L26 -2 Z" fill="#D9D2BE"></path>
        <text x="36" y="2" fill="#F2EFE5" font-weight="700">MEMORY.md</text>
      </g>
      
      <g transform="translate(44, 110)">
        <use href="#ico-folder" x="0" y="-12" width="22" height="16"></use>
        <text x="34" y="2" fill="#F2EFE5" fill-opacity="0.92">notes/</text>
      </g>
      
      <g transform="translate(72, 140)" font-size="13">
        <use href="#ico-file" x="0" y="-11" width="18" height="16"></use>
        <text x="30" y="2" fill="#F2EFE5" fill-opacity="0.80">api-rate-limits.md</text>
      </g>
      
      <g transform="translate(72, 168)" font-size="13">
        <use href="#ico-file" x="0" y="-11" width="18" height="16"></use>
        <text x="30" y="2" fill="#F2EFE5" fill-opacity="0.80">auth.md</text>
      </g>
      
      <g transform="translate(72, 198)" font-size="13">
        <use href="#ico-folder" x="0" y="-11" width="22" height="16"></use>
        <text x="30" y="2" fill="#F2EFE5" fill-opacity="0.85">errors/</text>
      </g>
      
      <g transform="translate(100, 226)" font-size="13">
        <use href="#ico-file" x="0" y="-11" width="18" height="16"></use>
        <text x="30" y="2" fill="#F2EFE5" fill-opacity="0.65">429.md</text>
      </g>
      
      <g transform="translate(44, 264)" font-size="14">
        <use href="#ico-folder" x="0" y="-12" width="22" height="16"></use>
        <text x="34" y="2" fill="#F2EFE5" fill-opacity="0.70">projects/</text>
      </g>
    </g>
  </g>

  
  <g transform="translate(1100, 360)">
    <rect width="420" height="380" rx="6" fill="#15151A" stroke="#F2EFE5" stroke-opacity="0.16"></rect>

    <text x="32" y="68" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#F2EFE5" letter-spacing="-0.02em"># Memory</text>

    <line x1="32" y1="100" x2="388" y2="100" stroke="#F2EFE5" stroke-opacity="0.10"></line>

    <text x="32" y="140" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#F2EFE5">## Project Facts</text>

    <g font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="13" fill="#F2EFE5" fill-opacity="0.74">
      <text x="32" y="170"><tspan fill="#D9D2BE">—</tspan>  Monorepo · turborepo · pnpm</text>
      <text x="32" y="194"><tspan fill="#D9D2BE">—</tspan>  Postgres in dev via docker-compose</text>
    </g>

    <text x="32" y="240" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#F2EFE5">## Architecture Notes</text>

    <g font-family="&#39;JetBrains Mono&#39;, ui-monospace, monospace" font-size="13" fill="#F2EFE5" fill-opacity="0.74">
      <text x="32" y="270"><tspan fill="#D9D2BE">—</tspan>  Event bus = NATS jetstream</text>
      <text x="32" y="294"><tspan fill="#D9D2BE">—</tspan>  Auth tokens rotate every 30 days</text>
      <text x="32" y="318"><tspan fill="#D9D2BE">—</tspan>  Embeddings: text-embedding-3-small</text>
    </g>
  </g>

  
  <text x="800" y="840" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="34" font-weight="600" fill="#F2EFE5" letter-spacing="-0.02em">unified, file-first memory for AI agents.</text>
</svg>